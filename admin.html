<!DOCTYPE html>
<html lang="en">

<head>

<title>MulltiBox Admin Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="admin.css">

</head>


<body>


<div class="admin-dashboard">



<!-- HEADER -->

<div class="admin-header">

<h1>
🚀 MulltiBox Control Panel
</h1>

<p>
Manage Movies • Series • Anime • Episodes
</p>

</div>





<!-- CONTENT TYPE SELECT -->

<div class="dashboard-menu">


<button onclick="showSection('movieSection')">
🎬 Movies
</button>
  

<button onclick="showSection('seriesSection')">
📺 Series
</button>
  

<button onclick="showSection('topSection')">
⭐ Top anime/series
</button>


<button onclick="showSection('animeSection')">
🍥 Anime
</button>


<button onclick="showSection('episodeSection')">
🎞 Episodes
</button>


</div>




<!-- MOVIE SECTION -->


<div class="admin-section active" id="movieSection">


<h2>
🎬 Add Movie
</h2>



<input id="movieTitle"
placeholder="Movie Title">



<input id="movieGenre"
placeholder="Genre">



<input id="movieYear"
placeholder="Release Year">



<input id="movieImage"
placeholder="Poster Image URL">



<input type="file"
id="videoFile"
accept="video/mp4">



<p id="uploadStatus"></p>



<textarea id="movieDesc"
placeholder="Movie Description">
</textarea>



<button onclick="addMovie()">
 Add Movie
</button>



</div>





<!-- TRENDING SECTION -->

<div class="admin-section" id="seriesSection">

<h2>🔥 Add Series</h2>


<input id="seriesTitle"
placeholder="Series Name">



<input id="seriesGenre"
placeholder="Genre">



<input id="seriesYear"
placeholder="Release Year">



<input id="seriesImage"
placeholder="Series Poster URL">



<textarea id="seriesDesc"
placeholder="Series Description">
</textarea>



<button onclick="addSeries()">
➕ Create Series Parent
</button>



</div>





<!-- RECOMMENDED SECTION -->


<div class="admin-section" id="topSection">


<h2>⭐ Add top anime/series</h2>



<input id="topTitle"
placeholder="Series Name">



<input id="topGenre"
placeholder="Genre">



<input id="topYear"
placeholder="Release Year">



<input id="topImage"
placeholder="Series Poster URL">



<textarea id="topDesc"
placeholder="Series Description">
</textarea>



<button onclick="addSeries()">
➕ Create Top A/S Parent
</button>



</div>


  

<!-- SERIES SECTION -->


<div class="admin-section" id="animeSection">


<h2>
📺 Add Anime
</h2>



<input id="animeTitle"
placeholder="Series Name">



<input id="animeGenre"
placeholder="Genre">



<input id="animeyear"
placeholder="Release Year">



<input id="animeImage"
placeholder="Series Poster URL">



<textarea id="animeDesc"
placeholder="Series Description">
</textarea>



<button onclick="addSeries()">
➕ Create Anime Parent
</button>



</div>



<!-- EPISODE SECTION -->


<div class="admin-section" id="episodeSection">


<h2>
🎞 Episode Manager
</h2>



<input id="episodeParent"
placeholder="Series / Anime ID">



<input id="episodeTitle"
placeholder="Episode Name (Episode 1)">



<input id="episodeNumber"
placeholder="Episode Number">



<input id="episodeImage"
placeholder="Episode Image URL">



<input type="file"
id="episodeVideo"
accept="video/mp4">



<p id="episodeUploadStatus"></p>




<textarea id="episodeDesc"
placeholder="Episode Description">
</textarea>



<button onclick="addEpisode()">
➕ Add Episode
</button>




</div>





<!-- DATABASE LIST -->


<div class="database-area">


<h2>
📂 Database Content
</h2>



<div id="movieList">

</div>



</div>






</div>








<script>


function showSection(id){


let sections =
document.querySelectorAll(".admin-section");


sections.forEach(section=>{

section.classList.remove("active");

});



document.getElementById(id)
.classList.add("active");

}


</script>



<script type="module" src="admin.js"></script>


</body>

</html>
