<!DOCTYPE html>
<html lang="en">

<head>

<title>AnimeHub - MulltiHub</title>


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">


<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;

}




body{


background:

radial-gradient(circle at top,#1f1f1f,transparent 35%),

linear-gradient(180deg,#050505,#0b0b0b);


color:white;


min-height:100vh;


}




/* HEADER */


header{


padding:45px 20px;


text-align:center;


background:#080808;


border-bottom:1px solid #222;


}




header h1{


font-size:45px;


font-weight:800;


background:

linear-gradient(
90deg,
#ffffff,
#e50914
);


background-clip:text;


color:transparent;


}






/* CONTAINER */


.container{


max-width:1000px;


margin:50px auto;


padding:20px;


}





/* GRID */


.grid{


display:grid;


grid-template-columns:

repeat(auto-fit,minmax(260px,1fr));


gap:25px;


}






/* CARD */


.card{


background:#111;


padding:30px;


border-radius:22px;


border:1px solid #222;


transition:.3s;


box-shadow:

0 0 20px rgba(0,0,0,.3);


}



.card:hover{


transform:translateY(-8px);


border-color:#e50914;


box-shadow:

0 0 35px rgba(229,9,20,.25);


}






.card h3{


color:#e50914;


font-size:23px;


margin-bottom:15px;


}




.card p{


color:#aaa;


line-height:1.7;


}







/* BUTTON */


.btn{


display:inline-block;


margin-top:20px;


padding:12px 25px;


border-radius:50px;


background:

linear-gradient(
45deg,
#e50914,
#ff3b3b
);


color:white;


text-decoration:none;


font-weight:700;


transition:.3s;


box-shadow:

0 0 20px rgba(229,9,20,.4);


}




.btn:hover{


transform:translateY(-4px);


}







/* MOBILE */


@media(max-width:768px){



header h1{


font-size:32px;


}



.container{


padding:15px;


}



.card{


padding:25px;


}



}



</style>


</head>





<body>





<header>


<h1>

🌀 The Anime Library

</h1>


</header>







<div class="container">





<div class="grid">





<div class="card">


<h3>

💥㊙️ Dragon Ball

</h3>



<p>

The perfectly made readable manga of Dragon Ball and continued till Super 2.

</p>




<a class="btn" href="dragonball.html" target="_blank">

Start ▶

</a>



</div>








<div class="card">


<h3>

Soon...

</h3>



<p>

New anime content will be added soon.

</p>




<a class="btn" href="#">

Start ▶

</a>



</div>









<div class="card">


<h3>

Soon...

</h3>



<p>

More anime collections coming soon.

</p>




<a class="btn" href="#">

Start ▶

</a>



</div>






</div>




</div>





</body>

</html>
