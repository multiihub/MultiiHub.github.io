<!DOCTYPE html>

<title>Dragon Ball - MulltiHub</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">





<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;

}





body{


background:


radial-gradient(circle at top,#301000,transparent 35%),


linear-gradient(180deg,#050505,#0b0b0b);



color:white;


min-height:100vh;


}





/* HEADER */


header{


padding:50px 20px;


text-align:center;


background:#080808;


border-bottom:1px solid #222;


}




header h1{


font-size:45px;


font-weight:800;


background:

linear-gradient(
90deg,
#ffffff,
#ff9800
);


background-clip:text;


color:transparent;


}








/* MAIN */


.container{


max-width:1000px;


margin:50px auto;


padding:20px;


}






.category{


margin-bottom:25px;


font-size:28px;


font-weight:800;


color:#ff9800;


border-left:4px solid #ff9800;


padding-left:15px;


}






.grid{


display:grid;


grid-template-columns:

repeat(auto-fit,minmax(280px,1fr));


gap:25px;


}






.card{


background:#111;


padding:30px;


border-radius:25px;


border:1px solid #222;


transition:.3s;


}





.card:hover{


transform:translateY(-8px);


border-color:#ff9800;


box-shadow:

0 0 35px rgba(255,152,0,.25);


}







.card h3{


color:#ff9800;


font-size:22px;


margin-bottom:15px;


}







.card p{


color:#aaa;


line-height:1.7;


}








.btn{


display:inline-block;


margin-top:20px;


padding:13px 28px;


border-radius:50px;


background:

linear-gradient(
45deg,
#ff9800,
#ff5722
);



color:white;


text-decoration:none;


font-weight:700;


transition:.3s;


box-shadow:

0 0 20px rgba(255,152,0,.4);


}




.btn:hover{


transform:translateY(-5px);


}







/* FOOTER */


footer{


margin-top:70px;


padding:30px;


text-align:center;


background:#080808;


border-top:1px solid #222;


color:#888;


}



footer h2{


color:#ff9800;


}





/* MOBILE */


@media(max-width:768px){



header h1{


font-size:34px;


}



.container{


padding:15px;


}



.category{


font-size:22px;


}



.grid{


grid-template-columns:1fr;


}



.card{


padding:25px;


}



}




</style>


</head>
