<!DOCTYPE html>
<html lang="en">

<head>
<script src="https://quge5.com/88/tag.min.js" data-zone="259340" async data-cfasync="false"></script>

<title>Contact - MulltiHub</title>


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">



<style>


*{

margin:0;
padding:0;
box-sizing:border-box;
font-family:'Inter',sans-serif;

}



body{


background:

radial-gradient(circle at top,#1f1f1f,transparent 35%),

linear-gradient(180deg,#050505,#0b0b0b);


color:white;

min-height:100vh;

}





/* HEADER */


header{


padding:45px 20px;


text-align:center;


background:#080808;


border-bottom:1px solid #222;


}



header h1{


font-size:42px;


font-weight:800;


background:

linear-gradient(
90deg,
white,
#e50914
);


background-clip:text;


color:transparent;


}






/* CONTACT BOX */


.container{


max-width:550px;


margin:60px auto;


padding:35px;


background:#111;


border-radius:25px;


border:1px solid #222;


text-align:center;


box-shadow:

0 0 35px rgba(229,9,20,.15);


}





.container p{


color:#aaa;


line-height:1.7;


margin-bottom:30px;


}






/* BUTTON */


.btn{


display:block;


width:100%;


padding:16px;


margin-top:15px;


border-radius:50px;


text-decoration:none;


font-weight:700;


color:white;


background:

linear-gradient(
45deg,
#e50914,
#ff3b3b
);


transition:.3s;


box-shadow:

0 0 20px rgba(229,9,20,.4);


}



.btn:hover{


transform:translateY(-5px);


}





/* FOOTER */


footer{


margin-top:80px;


padding:30px;


text-align:center;


background:#080808;


border-top:1px solid #222;


color:#888;


}



footer h2{


color:#e50914;


}






@media(max-width:768px){



header h1{


font-size:32px;


}



.container{


margin:30px 15px;


padding:25px;


}



}



</style>


</head>



<body>




<header>


<h1>

📞 Contact Us

</h1>


</header>







<div class="container">


<p>

Have any questions, suggestions, or feedback?

Contact MulltiHub through our official form.

</p>





<a class="btn" href="https://form.jotform.com/261856338074060">

📧 Direct Contact Form

</a>




</div>







<footer>


<h2>

MulltiHub

</h2>


<p>

© 2026 MulltiHub | All Rights Reserved

</p>


</footer>





</body>

</html>
